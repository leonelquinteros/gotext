name: Gotext code check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: false
      id: go

    - name: Check out code
      uses: actions/checkout@v4

    - name: Run vet
      run: go vet ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.4
      